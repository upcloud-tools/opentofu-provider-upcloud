name: Lint
on:
  pull_request:

permissions: {}

jobs:
  golangci-lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - go.mod
              - go.sum
              - '.github/workflows/lint.yml'

      - if: steps.filter.outputs.go == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - if: steps.filter.outputs.go == 'true'
        uses: golangci/golangci-lint-action@db582008a42febd596419635a5abc9d9815daa9c # v9.2.1
        with:
          version: v2.12.2
          args: --timeout 5m

  docs-subcategories:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: docs-filter
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'examples/**'
              - 'subcategories.json'
              - 'templates/**'
              - '.github/workflows/lint.yml'

      - if: steps.docs-filter.outputs.docs == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - if: steps.docs-filter.outputs.docs == 'true'
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_wrapper: false

      - if: steps.docs-filter.outputs.docs == 'true'
        name: Generate documentation
        run: |
          tofu version
          make docs
