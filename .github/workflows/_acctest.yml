name: Acceptance Tests

on:
  workflow_call:
    inputs:
      tool:
        description: "Tool to use for the acceptance tests"
        required: true
        type: string

concurrency:
  # Can not use ${{ github.workflow }} here, as that value is inherited from the calling workflow.
  group: ${{ github.repository }}-acctest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  SelectGroups:
    runs-on: ubuntu-24.04
    outputs:
      groups: ${{ steps.select.outputs.groups }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Matrix: scripts/acctest-groups-from-diff.sh; rules: .github/acctest-path-mapping.json
      - name: Select acceptance test groups
        id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" != "pull_request" || -z "${BASE_SHA:-}" ]]; then
            groups=$(bash ./scripts/acctest-groups-from-diff.sh --all)
          else
            groups=$(git diff --name-only "$BASE_SHA...HEAD" | bash ./scripts/acctest-groups-from-diff.sh)
          fi

          echo "groups=$groups" >> "$GITHUB_OUTPUT"
          echo "Selected groups: $groups"

  Test:
    needs: SelectGroups
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJson(needs.SelectGroups.outputs.groups) }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
        if: inputs.tool == 'terraform'

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_wrapper: false
        if: inputs.tool == 'tofu'

      - name: Set TF_ACC_* environment for OpenTofu
        run: |
          echo "TF_ACC_TERRAFORM_PATH=$(which tofu)" >> "$GITHUB_ENV"
          echo "TF_ACC_PROVIDER_NAMESPACE=hashicorp" >> "$GITHUB_ENV"
          echo "TF_ACC_PROVIDER_HOST=registry.opentofu.org" >> "$GITHUB_ENV"
        if: inputs.tool == 'tofu'

      - name: "Print ${{ inputs.tool }} version"
        run: ${{ inputs.tool }} version

      - name: Run unittests
        run: make test
        if: matrix.group == 'unittests'

      - name: Run ${{ matrix.group }} acceptance tests
        env:
          UPCLOUD_USERNAME: ${{ secrets.UPCLOUD_USERNAME }}
          UPCLOUD_PASSWORD: ${{ secrets.UPCLOUD_PASSWORD }}
        if: env.UPCLOUD_PASSWORD != '' && matrix.group != 'unittests'
        run: make testacc-${{ matrix.group }}

  Cleanup:
    runs-on: ubuntu-24.04
    needs: Test
    if: ${{ always() }}
    steps:
      - name: Install upctl
        uses: UpCloudLtd/upcloud-cli-action@431cd636a879b137a92c291f6c72f68e8c01b738 # v1.0.1
        with:
          username: ${{ secrets.UPCLOUD_USERNAME }}
          password: ${{ secrets.UPCLOUD_PASSWORD }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Purge resources
        timeout-minutes: 5
        run: upctl all purge --include *tf-acc-test* --exclude *persistent*

      - name: List remaining resources
        run: upctl all list --include *tf-acc-test* --exclude *persistent*
        if: ${{ failure() }}
