name: Generate

on:
  push:
    branches:
      - test-make-generate # for testing
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

permissions: {}

jobs:
  update:
    name: Update
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_wrapper: false

      - name: Setup upctl
        run: go install github.com/UpCloudLtd/upcloud-cli/v3/...@latest

      - name: Generate JSON files
        env:
          UPCLOUD_USERNAME: ${{ secrets.UPCLOUD_USERNAME }}
          UPCLOUD_PASSWORD: ${{ secrets.UPCLOUD_PASSWORD }}
        run: make generate

      - name: Store diff in variable
        id: diff
        run: |
          {
            echo 'DIFF<<EOF'
            cat $(find internal/ -name "*.diff")
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Generate documentation
        run: |
          tofu version
          make docs

      - name: Create PR for update
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: internal/,docs/
          branch: ${{ github.ref == 'refs/heads/main' && 'chore/make-generate' || 'test/make-generate-output' }}
          commit-message: "chore: update generated files"
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          title: "chore: update generated files"
          body: |
            This is an automatically created PR. Changes were created by running `make generate`.

            ```diff
            ${{ steps.diff.outputs.DIFF }}
            ```
