name: OpenTofu

on:
  pull_request:
    paths:
      - .github/workflows/_acctest.yml
      - .github/workflows/test-pr.yml
      - go.mod
      - go.sum
      - GNUmakefile
      - internal/**
      - .github/acctest-path-mapping.json
      - scripts/acctest-groups-from-diff.jq
      - scripts/acctest-groups-from-diff.sh
      - upcloud/**

jobs:
  Test:
    uses: ./.github/workflows/_acctest.yml
    with:
      tool: tofu
    secrets: inherit
