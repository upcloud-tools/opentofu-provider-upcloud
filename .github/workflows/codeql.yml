name: CodeQL

on:
  push:
    branches: ["main"]
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - ".github/workflows/codeql.yml"
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions: {}

jobs:
  analysis:
    name: Analyze
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - go

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - go.mod
              - go.sum
              - '.github/workflows/codeql.yml'

      - if: steps.filter.outputs.go == 'true' || github.event_name != 'pull_request'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - if: steps.filter.outputs.go == 'true' || github.event_name != 'pull_request'
        uses: github/codeql-action/init@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          languages: ${{ matrix.language }}

      - if: steps.filter.outputs.go == 'true' || github.event_name != 'pull_request'
        run: make build

      - if: steps.filter.outputs.go == 'true' || github.event_name != 'pull_request'
        uses: github/codeql-action/analyze@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
